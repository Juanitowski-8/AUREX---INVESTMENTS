services:
  postgres:
    image: postgres:16-alpine
    container_name: aurex-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aurex_db}
      POSTGRES_USER: ${POSTGRES_USER:-aurex_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aurex_password}
    volumes:
      - aurex_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aurex_user} -d ${POSTGRES_DB:-aurex_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aurex-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  aurex_pg_data:
