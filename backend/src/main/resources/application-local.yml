# Perfil local: sin Docker (H2 en memoria + sin Redis).
# Uso: ./gradlew bootRun --args='--spring.profiles.active=local'
#   o: set SPRING_PROFILES_ACTIVE=local

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  datasource:
    url: jdbc:h2:mem:aurex_dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: true

aurex:
  market:
    cache-enabled: false
  alerts:
    evaluation-enabled: false
