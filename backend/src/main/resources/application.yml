spring:
  application:
    name: aurex-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/aurex_db}
    username: ${SPRING_DATASOURCE_USERNAME:aurex_user}
    password: ${SPRING_DATASOURCE_PASSWORD:aurex_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: ${PORT:${SERVER_PORT:8080}}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

aurex:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-long-random-secret-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  market:
    provider: ${AUREX_MARKET_PROVIDER:coingecko}
    persist-snapshots-on-read: false
    default-history-days: 30
    cache-enabled: ${AUREX_MARKET_CACHE_ENABLED:true}
    cache-ttl-seconds: 60
    coingecko:
      base-url: https://api.coingecko.com/api/v3
      timeout-seconds: 10
  alerts:
    evaluation-enabled: true
    evaluation-interval-ms: ${AUREX_ALERTS_EVALUATION_INTERVAL_MS:60000}
  ai:
    provider: ${AUREX_AI_PROVIDER:openai}
    max-prompt-chars: ${AUREX_AI_MAX_PROMPT_CHARS:4000}
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: https://api.openai.com/v1
      model: ${OPENAI_MODEL:gpt-4o-mini}
      timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:20}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      base-url: https://api.anthropic.com/v1
      model: ${ANTHROPIC_MODEL:claude-3-5-haiku-20241022}
      timeout-seconds: ${ANTHROPIC_TIMEOUT_SECONDS:20}
      max-tokens: ${ANTHROPIC_MAX_TOKENS:1024}

logging:
  level:
    root: INFO
    com.aurex.backend: DEBUG
    org.springframework.security: INFO

---
# Sin Redis cuando la caché de mercado está desactivada (p. ej. primer deploy en Render).
spring:
  config:
    activate:
      on-property:
        name: aurex.market.cache-enabled
        having-value: "false"
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
